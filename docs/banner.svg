<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 625" width="1360" height="625" role="img" aria-label="wi — deterministic multi-repo workspace isolation. Reading left to right: a shared base spine holds one pristine SSOT mirror per repo (api @main, web @main, never dirtied); a cyan isolate arrow cuts one isolated worktree set per task (add-auth, fix-cache, bump-deps) where agents work in parallel; a single bold amber LAND arc returns the work along the bottom onto base by fast-forward only — base advances, never force.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#0B1A33"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E6E88"/>
      <stop offset="0.5" stop-color="#54C7E8"/>
      <stop offset="1" stop-color="#2E6E88"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#54C7E8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#54C7E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F2B43C" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#F2B43C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#4F86C6" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="1360" height="625" fill="url(#bg)"/>
  <rect x="0" y="0" width="1360" height="625" fill="url(#grid)"/>
  <ellipse cx="175" cy="195" rx="275" ry="215" fill="url(#cyanGlow)"/>
  <ellipse cx="820" cy="470" rx="370" ry="130" fill="url(#amberGlow)"/>

  <!-- ============ LEFT · identity ============ -->
  <text x="56" y="96" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="3" fill="#6E89AD">MULTI-REPO WORKSPACE ISOLATION</text>

  <text x="52" y="214" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="128" font-weight="700" fill="#E2ECF7">wi</text>
  <rect x="222" y="140" width="18" height="76" fill="#F2B43C"/>

  <text x="56" y="258" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="25" font-weight="600" fill="#E2ECF7">Deterministic multi-repo</text>
  <text x="56" y="290" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="25" font-weight="600" fill="#E2ECF7">workspace isolation</text>

  <text x="56" y="326" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#93A7C2">one mirror · many isolated worktrees · ff-only land</text>

  <text x="56" y="366" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13.5" fill="#54C7E8"><tspan fill="#6E89AD">$</tspan> wi isolate new add-auth api web</text>
  <text x="56" y="390" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#6E89AD">→ 2 worktrees materialized · one JSON envelope · exit 0</text>

  <!-- ============ RIGHT · schematic ============ -->
  <!-- stage titles -->
  <text x="648" y="116" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#6E89AD">SSOT MIRROR</text>
  <text x="648" y="134" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10.5" fill="#2E7E9A">detached @ base · never dirtied</text>
  <text x="947" y="116" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#6E89AD">ISOLATE</text>
  <text x="947" y="134" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10.5" fill="#2E7E9A">one worktree set per task</text>

  <!-- base spine (shared trunk / base ref) -->
  <rect x="556" y="170" width="8" height="188" rx="4" fill="url(#spine)"/>
  <circle cx="560" cy="170" r="4" fill="#54C7E8"/>
  <text x="548" y="174" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#6E89AD">base</text>

  <!-- mirror node: api -->
  <line x1="564" y1="216" x2="584" y2="216" stroke="#54C7E8" stroke-opacity="0.7" stroke-width="1.2"/>
  <rect x="584" y="196" width="150" height="40" rx="8" fill="#101D33" stroke="#54C7E8" stroke-width="1.3"/>
  <text x="600" y="221" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#E2ECF7">api</text>
  <text x="718" y="220" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6E89AD">@main</text>

  <!-- mirror node: web -->
  <line x1="564" y1="282" x2="584" y2="282" stroke="#54C7E8" stroke-opacity="0.7" stroke-width="1.2"/>
  <rect x="584" y="262" width="150" height="40" rx="8" fill="#101D33" stroke="#54C7E8" stroke-width="1.3"/>
  <text x="600" y="287" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#E2ECF7">web</text>
  <text x="718" y="286" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#6E89AD">@main</text>

  <!-- cyan isolate connector: mirror -> isolate fan-out bus -->
  <line x1="740" y1="288" x2="806" y2="288" stroke="#54C7E8" stroke-width="1.6"/>
  <circle cx="810" cy="288" r="3" fill="#54C7E8"/>
  <line x1="812" y1="204" x2="812" y2="372" stroke="#54C7E8" stroke-width="1.4" stroke-opacity="0.85"/>
  <line x1="812" y1="204" x2="816" y2="204" stroke="#54C7E8" stroke-width="1.4"/>
  <polygon points="823,204 815,200 815,208" fill="#54C7E8"/>
  <line x1="812" y1="288" x2="816" y2="288" stroke="#54C7E8" stroke-width="1.4"/>
  <polygon points="823,288 815,284 815,292" fill="#54C7E8"/>
  <line x1="812" y1="372" x2="816" y2="372" stroke="#54C7E8" stroke-width="1.4"/>
  <polygon points="823,372 815,368 815,376" fill="#54C7E8"/>
  <text x="772" y="272" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#6E89AD">isolate ▸</text>

  <!-- isolate card A: add-auth {api, web} -->
  <rect x="822" y="168" width="250" height="72" rx="10" fill="#0E1A30" stroke="#2C476B" stroke-width="1.2"/>
  <text x="838" y="190" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#54C7E8">isolas/add-auth/</text>
  <rect x="838" y="205" width="64" height="24" rx="6" fill="#101D33" stroke="#2E6E88" stroke-width="1"/>
  <text x="870" y="221" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#CFE2F2">api</text>
  <rect x="910" y="205" width="64" height="24" rx="6" fill="#101D33" stroke="#2E6E88" stroke-width="1"/>
  <text x="942" y="221" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#CFE2F2">web</text>
  <circle cx="1000" cy="217" r="4" fill="#54C7E8"/>
  <text x="1056" y="221" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#6E89AD">agent</text>

  <!-- isolate card B: fix-cache {api, web} -->
  <rect x="822" y="252" width="250" height="72" rx="10" fill="#0E1A30" stroke="#2C476B" stroke-width="1.2"/>
  <text x="838" y="274" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#54C7E8">isolas/fix-cache/</text>
  <rect x="838" y="289" width="64" height="24" rx="6" fill="#101D33" stroke="#2E6E88" stroke-width="1"/>
  <text x="870" y="305" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#CFE2F2">api</text>
  <rect x="910" y="289" width="64" height="24" rx="6" fill="#101D33" stroke="#2E6E88" stroke-width="1"/>
  <text x="942" y="305" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#CFE2F2">web</text>
  <circle cx="1000" cy="301" r="4" fill="#54C7E8"/>
  <text x="1056" y="305" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#6E89AD">agent</text>

  <!-- isolate card C: bump-deps {api} -->
  <rect x="822" y="336" width="250" height="72" rx="10" fill="#0E1A30" stroke="#2C476B" stroke-width="1.2"/>
  <text x="838" y="358" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#54C7E8">isolas/bump-deps/</text>
  <rect x="838" y="373" width="64" height="24" rx="6" fill="#101D33" stroke="#2E6E88" stroke-width="1"/>
  <text x="870" y="389" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11.5" fill="#CFE2F2">api</text>
  <circle cx="1000" cy="385" r="4" fill="#54C7E8"/>
  <text x="1056" y="389" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#6E89AD">agent</text>

  <text x="947" y="430" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="10" fill="#5C7799">parallel · isolated · non-colliding</text>

  <!-- LAND · the fast-forward return arc (the one bold amber accent) -->
  <path d="M1072,372 C1118,388 1118,444 1068,466 C980,488 700,490 598,470 C574,464 562,442 562,408 L560,356" fill="none" stroke="#F2B43C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="560,353 552,368 568,368" fill="#F2B43C"/>

  <!-- LAND label in its own clear band beneath the arc -->
  <text x="848" y="518" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14"><tspan fill="#F2B43C" font-weight="700" letter-spacing="1">LAND ↩</tspan><tspan dx="15" fill="#F2B43C">fast-forward only</tspan><tspan dx="18" fill="#7E93AE">·</tspan><tspan dx="18" fill="#D98A24">base advances ▲</tspan><tspan dx="18" fill="#7E93AE">·</tspan><tspan dx="18" fill="#6E89AD">never force</tspan><tspan dx="18" fill="#7E93AE">·</tspan><tspan dx="18" fill="#6E89AD">never reset --hard</tspan></text>

  <!-- ============ invariant strip ============ -->
  <line x1="56" y1="556" x2="1304" y2="556" stroke="#2C476B" stroke-opacity="0.55" stroke-width="1"/>
  <text x="56" y="586" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" fill="#7E93AE">no LLM dependency&#160;&#160;·&#160;&#160;no hidden network&#160;&#160;·&#160;&#160;evidence-positive gc&#160;&#160;·&#160;&#160;liveness-aware locks&#160;&#160;·&#160;&#160;offline roll-forward&#160;&#160;·&#160;&#160;frozen exit codes</text>
</svg>
