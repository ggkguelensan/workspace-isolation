<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260" role="img" aria-label="wi — deterministic multi-repo workspace isolation. A cyan git branch forks off the base line to isolate a task, then lands back onto base by fast-forward, marked by the amber node.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#0B1A33"/>
    </linearGradient>
    <linearGradient id="trunk" gradientUnits="userSpaceOnUse" x1="200" y1="90" x2="470" y2="90">
      <stop offset="0" stop-color="#2E6E88"/>
      <stop offset="0.5" stop-color="#54C7E8"/>
      <stop offset="1" stop-color="#2E6E88"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#54C7E8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#54C7E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F2B43C" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F2B43C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect x="0" y="0" width="680" height="260" rx="28" fill="url(#bg)"/>
  <ellipse cx="357" cy="58" rx="175" ry="92" fill="url(#cyanGlow)"/>
  <ellipse cx="450" cy="92" rx="120" ry="80" fill="url(#amberGlow)"/>

  <!-- ===== git-graph: base trunk + isolate branch + ff land ===== -->
  <!-- base trunk line, riding across the top of the wordmark -->
  <line x1="200" y1="90" x2="470" y2="90" stroke="url(#trunk)" stroke-width="5" stroke-linecap="round"/>

  <!-- isolate branch: forks off the base, arcs over the name, lands back -->
  <path d="M262,90 C 298,44 416,44 452,90" fill="none" stroke="#54C7E8" stroke-width="4.5" stroke-linecap="round"/>

  <!-- base ref node -->
  <circle cx="214" cy="90" r="8" fill="#54C7E8"/>
  <!-- isolated worktree node (agent works here) -->
  <circle cx="357" cy="55" r="7" fill="#0B1A33" stroke="#54C7E8" stroke-width="3.5"/>
  <!-- LAND node: ff-only merge back onto base — the single amber pop -->
  <circle cx="452" cy="90" r="9" fill="#F2B43C"/>

  <!-- ===== wordmark ===== -->
  <text x="256" y="188" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="140" font-weight="700" fill="#E2ECF7" letter-spacing="2">wi</text>

  <!-- grounding underline -->
  <line x1="256" y1="212" x2="424" y2="212" stroke="#2E6E88" stroke-width="4" stroke-linecap="round"/>
</svg>
