<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 286" width="460" height="286" role="img" aria-label="wi — deterministic multi-repo workspace isolation. The dot of the i is a cyan commit node riding the base-ref line.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#0B1A33"/>
    </linearGradient>
    <linearGradient id="ref" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2E6E88" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#2E6E88"/>
      <stop offset="0.5" stop-color="#54C7E8"/>
      <stop offset="0.84" stop-color="#2E6E88"/>
      <stop offset="1" stop-color="#2E6E88" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#54C7E8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#54C7E8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- navy ground -->
  <rect x="0" y="0" width="460" height="286" rx="40" fill="url(#bg)"/>

  <!-- base-ref line (the trunk / base ref the dot rides) -->
  <rect x="50" y="85" width="360" height="7" rx="3.5" fill="url(#ref)"/>

  <!-- node glow -->
  <circle cx="265" cy="88" r="34" fill="url(#nodeGlow)"/>

  <!-- ===== wordmark: w (text) + i (stem) ===== -->
  <text x="130" y="192" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="150" font-weight="700" fill="#E2ECF7">w</text>
  <!-- i stem -->
  <rect x="255" y="114" width="20" height="78" rx="6" fill="#E2ECF7"/>
  <!-- i dot == commit node sitting on the base-ref line -->
  <circle cx="265" cy="88" r="15" fill="#54C7E8"/>

  <!-- amber landing tick on the line (single accent — where work lands) -->
  <rect x="318" y="73" width="10" height="30" rx="5" fill="#F2B43C"/>

  <!-- grounding stroke beneath the wordmark -->
  <rect x="136" y="205" width="148" height="5" rx="2.5" fill="#2E6E88" fill-opacity="0.7"/>
</svg>
