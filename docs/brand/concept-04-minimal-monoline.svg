<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" width="620" height="220" role="img" aria-label="wi — deterministic multi-repo workspace isolation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#0B1A33"/>
    </linearGradient>
  </defs>

  <!-- navy ground -->
  <rect x="0" y="0" width="620" height="220" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="618" height="218" rx="25" fill="none" stroke="#16243F" stroke-width="1"/>

  <!-- base-ref spine line riding the top, carrying the commit node -->
  <line x1="180" y1="30" x2="440" y2="30" stroke="#54C7E8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- commit node: monoline outline ring seated on the spine -->
  <circle cx="310" cy="30" r="9" fill="#0A1325" stroke="#54C7E8" stroke-width="3.5"/>

  <!-- wordmark -->
  <text x="220" y="158" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="150" font-weight="500" fill="#E2ECF7">wi</text>

  <!-- amber accent: the single pop — a short tick to the right of the i -->
  <rect x="418" y="104" width="5" height="30" rx="2.5" fill="#F2B43C"/>

  <!-- thin grounding rule beneath the letters (same stroke weight, dim cyan) -->
  <line x1="226" y1="180" x2="402" y2="180" stroke="#2E6E88" stroke-width="3.5" stroke-linecap="round"/>
</svg>
