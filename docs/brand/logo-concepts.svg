<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1240" width="1300" height="1240" role="img" aria-label="wi logomark concepts — four directions drawn from the owner's sketch, plus one set-aside option.">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#081020"/>
    </linearGradient>
    <radialGradient id="pgGlow" cx="0.5" cy="0" r="0.7">
      <stop offset="0" stop-color="#0d1f3d" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0d1f3d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1300" height="1240" fill="url(#pg)"/>
  <rect x="0" y="0" width="1300" height="520" fill="url(#pgGlow)"/>

  <!-- header -->
  <line x1="70" y1="64" x2="98" y2="64" stroke="#54C7E8" stroke-width="2" stroke-linecap="round"/>
  <text x="110" y="69" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="4" fill="#2E7E9A">WI · LOGOMARK CONCEPTS</text>
  <text x="70" y="120" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="40" font-weight="600" fill="#E2ECF7">Four ways to draw <tspan fill="#54C7E8">wi</tspan>.</text>
  <text x="70" y="150" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">Each takes your sketch — base-ref line + commit node across the top, grounding stroke, amber accent — and resolves it differently.</text>

  <!-- ============ TILE A — 01 square badge ============ -->
  <svg x="255" y="190" width="190" height="190" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="c4bg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#0A1222"/><stop offset="1" stop-color="#0B1A33"/></linearGradient>
      <linearGradient id="c4branch" gradientUnits="userSpaceOnUse" x1="80" y1="110" x2="320" y2="110"><stop offset="0" stop-color="#2E7E9A"/><stop offset="0.5" stop-color="#54C7E8"/><stop offset="1" stop-color="#2E7E9A"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="400" height="400" rx="90" fill="url(#c4bg)"/>
    <rect x="2" y="2" width="396" height="396" rx="88" fill="none" stroke="#2C476B" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="80" y="107" width="240" height="6" rx="3" fill="url(#c4branch)"/>
    <circle cx="200" cy="110" r="16" fill="#54C7E8"/>
    <text x="188" y="272" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="172" font-weight="700" fill="#E2ECF7">wi</text>
    <rect x="306" y="192" width="16" height="80" rx="3" fill="#F2B43C"/>
    <line x1="98" y1="300" x2="276" y2="300" stroke="#2E7E9A" stroke-width="6" stroke-linecap="round"/>
  </svg>
  <text x="70" y="432" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#54C7E8">01 · SAFEST · MOST FAITHFUL</text>
  <text x="70" y="468" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#E2ECF7">Square badge</text>
  <text x="70" y="497" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">Your whole sketch, boxed — and a crisp app icon down to 32px.</text>

  <!-- ============ TILE B — 02 branch through letters ============ -->
  <svg x="702" y="190" width="497" height="190" viewBox="0 0 680 260" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="c3bg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#0A1222"/><stop offset="1" stop-color="#0B1A33"/></linearGradient>
      <linearGradient id="c3trunk" gradientUnits="userSpaceOnUse" x1="200" y1="90" x2="470" y2="90"><stop offset="0" stop-color="#2E6E88"/><stop offset="0.5" stop-color="#54C7E8"/><stop offset="1" stop-color="#2E6E88"/></linearGradient>
      <radialGradient id="c3cyanGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#54C7E8" stop-opacity="0.16"/><stop offset="1" stop-color="#54C7E8" stop-opacity="0"/></radialGradient>
      <radialGradient id="c3amberGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#F2B43C" stop-opacity="0.22"/><stop offset="1" stop-color="#F2B43C" stop-opacity="0"/></radialGradient>
    </defs>
    <rect x="0" y="0" width="680" height="260" rx="28" fill="url(#c3bg)"/>
    <ellipse cx="357" cy="58" rx="175" ry="92" fill="url(#c3cyanGlow)"/>
    <ellipse cx="450" cy="92" rx="120" ry="80" fill="url(#c3amberGlow)"/>
    <line x1="200" y1="90" x2="470" y2="90" stroke="url(#c3trunk)" stroke-width="5" stroke-linecap="round"/>
    <path d="M262,90 C 298,44 416,44 452,90" fill="none" stroke="#54C7E8" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="214" cy="90" r="8" fill="#54C7E8"/>
    <circle cx="357" cy="55" r="7" fill="#0B1A33" stroke="#54C7E8" stroke-width="3.5"/>
    <circle cx="452" cy="90" r="9" fill="#F2B43C"/>
    <text x="256" y="188" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="140" font-weight="700" fill="#E2ECF7" letter-spacing="2">wi</text>
    <line x1="256" y1="212" x2="424" y2="212" stroke="#2E6E88" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <text x="670" y="432" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#F2B43C">02 · BOLDEST · TELLS THE STORY</text>
  <text x="670" y="468" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#E2ECF7">Branch through letters</text>
  <text x="670" y="497" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">A git graph forks to isolate, then fast-forwards onto the amber land node.</text>

  <!-- ============ TILE C — 03 i-dot node ============ -->
  <svg x="197" y="560" width="306" height="190" viewBox="0 0 460 286" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="c2bg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#0A1222"/><stop offset="1" stop-color="#0B1A33"/></linearGradient>
      <linearGradient id="c2ref" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2E6E88" stop-opacity="0"/><stop offset="0.16" stop-color="#2E6E88"/><stop offset="0.5" stop-color="#54C7E8"/><stop offset="0.84" stop-color="#2E6E88"/><stop offset="1" stop-color="#2E6E88" stop-opacity="0"/></linearGradient>
      <radialGradient id="c2nodeGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#54C7E8" stop-opacity="0.32"/><stop offset="1" stop-color="#54C7E8" stop-opacity="0"/></radialGradient>
    </defs>
    <rect x="0" y="0" width="460" height="286" rx="40" fill="url(#c2bg)"/>
    <rect x="50" y="85" width="360" height="7" rx="3.5" fill="url(#c2ref)"/>
    <circle cx="265" cy="88" r="34" fill="url(#c2nodeGlow)"/>
    <text x="130" y="192" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="150" font-weight="700" fill="#E2ECF7">w</text>
    <rect x="255" y="114" width="20" height="78" rx="6" fill="#E2ECF7"/>
    <circle cx="265" cy="88" r="15" fill="#54C7E8"/>
    <rect x="318" y="73" width="10" height="30" rx="5" fill="#F2B43C"/>
    <rect x="136" y="205" width="148" height="5" rx="2.5" fill="#2E6E88" fill-opacity="0.7"/>
  </svg>
  <text x="70" y="802" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#54C7E8">03 · CLEVEREST HOOK</text>
  <text x="70" y="838" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#E2ECF7">The i-dot is the node</text>
  <text x="70" y="867" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">The i's tittle becomes the commit node riding the base-ref line.</text>

  <!-- ============ TILE D — 04 minimal monoline ============ -->
  <svg x="682" y="560" width="536" height="190" viewBox="0 0 620 220" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="c5bg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#0A1222"/><stop offset="1" stop-color="#0B1A33"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="620" height="220" rx="26" fill="url(#c5bg)"/>
    <rect x="1" y="1" width="618" height="218" rx="25" fill="none" stroke="#16243F" stroke-width="1"/>
    <line x1="180" y1="30" x2="440" y2="30" stroke="#54C7E8" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="310" cy="30" r="9" fill="#0A1325" stroke="#54C7E8" stroke-width="3.5"/>
    <text x="220" y="158" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="150" font-weight="500" fill="#E2ECF7">wi</text>
    <rect x="418" y="104" width="5" height="30" rx="2.5" fill="#F2B43C"/>
    <line x1="226" y1="180" x2="402" y2="180" stroke="#2E6E88" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
  <text x="670" y="802" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#54C7E8">04 · MOST MINIMAL</text>
  <text x="670" y="838" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="600" fill="#E2ECF7">Minimal monoline</text>
  <text x="670" y="867" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">One quiet cyan stroke and a ring node. Architectural, lots of air.</text>

  <!-- divider -->
  <line x1="70" y1="940" x2="1230" y2="940" stroke="#16243F" stroke-width="1"/>

  <!-- ============ set-aside #1 ============ -->
  <svg x="70" y="970" width="300" height="112" viewBox="0 0 640 240" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="c1bg" x1="0" y1="0" x2="0.45" y2="1"><stop offset="0" stop-color="#0A1222"/><stop offset="1" stop-color="#0B1A33"/></linearGradient>
      <linearGradient id="c1hline" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3FA0C0"/><stop offset="0.5" stop-color="#54C7E8"/><stop offset="1" stop-color="#3FA0C0"/></linearGradient>
      <radialGradient id="c1nodeGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#54C7E8" stop-opacity="0.22"/><stop offset="1" stop-color="#54C7E8" stop-opacity="0"/></radialGradient>
    </defs>
    <rect x="0" y="0" width="640" height="240" rx="28" fill="url(#c1bg)" opacity="0.7"/>
    <circle cx="300" cy="52" r="52" fill="url(#c1nodeGlow)"/>
    <line x1="196" y1="52" x2="400" y2="52" stroke="url(#c1hline)" stroke-width="6" stroke-linecap="round" opacity="0.62"/>
    <circle cx="300" cy="52" r="15.5" fill="#0B1A33"/>
    <circle cx="300" cy="52" r="10.5" fill="#54C7E8" opacity="0.62"/>
    <text x="300" y="178" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="168" font-weight="700" fill="#E2ECF7" opacity="0.62">wi</text>
    <rect x="408" y="76" width="15" height="98" rx="3" fill="#F2B43C" opacity="0.62"/>
    <line x1="206" y1="200" x2="396" y2="200" stroke="url(#c1hline)" stroke-width="7" stroke-linecap="round" opacity="0.62"/>
  </svg>
  <text x="410" y="1002" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.5" fill="#506b8e">SET ASIDE</text>
  <text x="410" y="1036" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" font-weight="600" fill="#93A7C2">Floating-node lockup</text>
  <text x="410" y="1064" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14.5" fill="#6E89AD">Drops the base-ref line and the grounding underline; the loose node beside the square</text>
  <text x="410" y="1086" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14.5" fill="#6E89AD">tittle reads as two stray dots. The square badge (01) does the same job, more completely.</text>

  <!-- footer -->
  <line x1="70" y1="1150" x2="1230" y2="1150" stroke="#16243F" stroke-width="1"/>
  <text x="70" y="1192" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="2" fill="#2E7E9A">HOW TO CHOOSE</text>
  <text x="240" y="1192" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" fill="#93A7C2">Name a number — or mix 01 as the icon + a wide wordmark for headers. Tweaks welcome; nothing is committed until you pick.</text>
</svg>
