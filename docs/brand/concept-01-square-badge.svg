<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="wi — workspace isolation. The wi wordmark with a cyan base-ref branch line and commit node across the top, a cyan grounding underline, and an amber accent bar.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#0B1A33"/>
    </linearGradient>
    <linearGradient id="branch" gradientUnits="userSpaceOnUse" x1="80" y1="110" x2="320" y2="110">
      <stop offset="0" stop-color="#2E7E9A"/>
      <stop offset="0.5" stop-color="#54C7E8"/>
      <stop offset="1" stop-color="#2E7E9A"/>
    </linearGradient>
  </defs>

  <!-- rounded-square navy tile -->
  <rect x="0" y="0" width="400" height="400" rx="90" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="396" rx="88" fill="none" stroke="#2C476B" stroke-opacity="0.55" stroke-width="2"/>

  <!-- base-ref branch line riding across the top, carrying a commit node -->
  <rect x="80" y="107" width="240" height="6" rx="3" fill="url(#branch)"/>
  <circle cx="200" cy="110" r="16" fill="#54C7E8"/>

  <!-- wi wordmark (mono, heavy) -->
  <text x="188" y="272" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="172" font-weight="700" fill="#E2ECF7">wi</text>

  <!-- amber accent bar — single pop, to the right of the i -->
  <rect x="306" y="192" width="16" height="80" rx="3" fill="#F2B43C"/>

  <!-- grounding underline beneath the letters -->
  <line x1="98" y1="300" x2="276" y2="300" stroke="#2E7E9A" stroke-width="6" stroke-linecap="round"/>
</svg>
