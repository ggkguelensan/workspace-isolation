# goreleaser config for the `wi` binary (schema v2; pinned major `~> v2`, never auto-upgraded —
# PLAN §6). This is release DATA, not Go: its fitness is `goreleaser check` (run in CI and locally),
# NOT a `go test` guard. Sub-unit (b) of M3 release scaffolding — the build/archive/checksum/release
# core. The Homebrew `brews:` block (sub-unit c) and the tag-push release workflow land next.
#
# Decision #GR (recorded in PROGRESS.md): cross-compile cmd/wi for {darwin,linux} × {amd64,arm64},
# reproducible (CGO off + -trimpath + mod_timestamp), tar.gz archives + a sha256 checksums file.
# Version stamping via -X is intentionally omitted: cmd/wi/main.go declares no version/commit/date
# vars yet, so referencing them would inject into non-existent symbols — deferred to a `wi version`
# unit that adds the vars first.
version: 2

project_name: wi

before:
  hooks:
    # Keep the module graph tidy and pre-download deps before the matrix build fans out.
    - go mod tidy
    - go mod download

builds:
  - id: wi
    main: ./cmd/wi
    binary: wi
    env:
      - CGO_ENABLED=0 # static, pure-Go (INV-NO-LLM/zero-cgo posture); reproducible across hosts
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath # strip local paths from the binary → reproducible builds
    ldflags:
      - -s -w # drop symbol table + DWARF; smaller release binaries
    mod_timestamp: "{{ .CommitTimestamp }}" # deterministic file mtimes for byte-stable archives

archives:
  - id: wi
    ids:
      - wi
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE* # glob; harmless if absent until a license lands

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  # `goreleaser build/release --snapshot` (no git tag) needs a synthetic version.
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ggkguelensan
    name: workspace-isolation
  draft: false
  prerelease: auto # a v*-rc / pre-release tag is published as a prerelease
  mode: replace

# Homebrew tap (sub-unit c) — a CASK, not a formula (decision #HC). goreleaser HARD-deprecated
# `brews` (formula) inside the `~> v2` range we pin (so PLAN §6's "pin the major to dodge the
# deprecation, cask rejected" mitigation does not hold — `goreleaser check`, our fitness, FAILS on
# `brews`), steering prebuilt-binary Homebrew distribution to `homebrew_casks`. Casks are macOS-only,
# so `brew install --cask ggkguelensan/tap/wi` covers macOS; Linux users take the release tarballs
# (or `go install`). On a real release goreleaser pushes the generated cask to the SEPARATE repo
# ggkguelensan/homebrew-tap; the cross-repo push needs a PAT (the default Actions GITHUB_TOKEN can't
# write another repo) — supplied via the HOMEBREW_TAP_GITHUB_TOKEN secret the release workflow passes
# through. `goreleaser check` validates this block without the token (it doesn't execute templates).
homebrew_casks:
  - name: wi
    repository:
      owner: ggkguelensan
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/ggkguelensan/workspace-isolation"
    description: "Deterministic multi-repo workspace isolation for parallel coding agents"
    # license: intentionally unset — the repo has no LICENSE yet (an owner legal decision).
    #          Add a LICENSE file + set this to its SPDX id before the first tagged release.
    skip_upload: auto # don't overwrite the stable cask from a snapshot or prerelease tag
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
